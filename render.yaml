services:
  - type: web
    name: sunshine-node-link
    runtime: image
    image:
      url: docker.io/bacontheoverseer/sunshine-learning:latest # Pulls directly from your Docker Hub
    repo: https://github.com/bacontheoverseer/SunshineNord-deployer # Link to your github repo
    plan: free
    region: oregon # Fast default region
    envVars:
      - key: PORT
        value: 3000
